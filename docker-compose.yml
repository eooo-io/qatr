services:
  # ── PHP-FPM (Laravel API) ──────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: qatr-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage/app:/var/www/storage/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: qatr
      DB_USERNAME: qatr
      DB_PASSWORD: qatr_secret
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      FRONTEND_URL: http://localhost:5173
    networks:
      - qatr

  # ── Nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qatr-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - qatr

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: qatr-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qatr
      POSTGRES_USER: qatr
      POSTGRES_PASSWORD: qatr_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qatr"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qatr

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qatr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - qatr

  # ── Queue Worker (Horizon) ────────────────────────────────────
  horizon:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: qatr-horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./backend:/var/www
    depends_on:
      - app
      - redis
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: qatr
      DB_USERNAME: qatr
      DB_PASSWORD: qatr_secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    networks:
      - qatr

  # ── Frontend (Vite dev server) ────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: qatr-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    networks:
      - qatr

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:

networks:
  qatr:
    driver: bridge
